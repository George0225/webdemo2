<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医疗器械数据平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.47059;
            -webkit-font-smoothing: antialiased;
        }

        /* Header - Apple Style */
        header {
            background: #fff;
            padding: 80px 20px 60px;
            text-align: center;
            border-bottom: 1px solid #d2d2d7;
        }

        header h1 {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #1d1d1f 0%, #434344 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 21px;
            color: #86868b;
            font-weight: 400;
            margin-bottom: 32px;
        }

        header button {
            padding: 14px 32px;
            background: #0071e3;
            color: #fff;
            border: none;
            border-radius: 980px;
            font-size: 17px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        header button:hover {
            background: #0077ed;
            transform: scale(1.02);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* Stats Cards - Apple Style */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: #fff;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #86868b;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-card .number {
            font-size: 40px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.02em;
        }

        .stat-card .label {
            font-size: 15px;
            color: #86868b;
            margin-top: 4px;
        }

        /* Search Section */
        .search-section {
            background: #fff;
            border-radius: 18px;
            padding: 32px;
            margin-bottom: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            background: #f5f5f7;
            border: 1px solid transparent;
            border-radius: 12px;
            color: #1d1d1f;
            font-size: 17px;
            transition: all 0.2s ease;
        }

        .search-box input::placeholder {
            color: #86868b;
        }

        .search-box input:focus {
            outline: none;
            background: #fff;
            border-color: #0071e3;
        }

        .search-box button {
            padding: 16px 28px;
            background: #0071e3;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .search-box button:hover {
            background: #0077ed;
        }

        /* Filter Tags */
        .filter-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 10px 20px;
            background: #f5f5f7;
            border: none;
            border-radius: 980px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            color: #1d1d1f;
            font-weight: 400;
        }

        .filter-tag:hover {
            background: #e8e8ed;
        }

        .filter-tag.active {
            background: #0071e3;
            color: #fff;
        }

        /* Data Section */
        .data-section {
            background: #fff;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #d2d2d7;
        }

        .section-header h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .update-time {
            font-size: 14px;
            color: #86868b;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid #d2d2d7;
        }

        th {
            font-weight: 600;
            color: #86868b;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:hover {
            background: #f5f5f7;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 980px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-valid {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-expired {
            background: #ffebee;
            color: #c62828;
        }

        .category-tag {
            display: inline-block;
            padding: 6px 12px;
            background: #f5f5f7;
            color: #1d1d1f;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
        }

        code {
            background: #f5f5f7;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'SF Mono', monospace;
            font-size: 13px;
            color: #1d1d1f;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 32px;
        }

        .pagination button {
            padding: 12px 20px;
            background: transparent;
            border: 1px solid #d2d2d7;
            color: #1d1d1f;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .pagination button:hover {
            background: #f5f5f7;
        }

        .pagination button.active {
            background: #0071e3;
            border-color: #0071e3;
            color: #fff;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: #86868b;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #f5f5f7;
            border-top-color: #0071e3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 60px 20px 40px;
            }

            header h1 {
                font-size: 32px;
            }

            header p {
                font-size: 18px;
            }

            .container {
                padding: 40px 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .search-box {
                flex-direction: column;
            }

            table {
                font-size: 14px;
            }

            th, td {
                padding: 12px 8px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>医疗器械数据平台</h1>
        <p>实时抓取 · 动态更新 · 便捷查询</p>
        <button onclick="manualRefresh()">手动刷新数据</button>
    </header>

    <div class="container">
        <!-- Stats -->
        <div class="stats-grid" id="statsContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载统计中...</p>
            </div>
        </div>

        <!-- Search -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索产品名称、厂商、注册证号...">
                <button onclick="searchDevices()">搜索</button>
            </div>
            <div class="filter-tags">
                <span class="filter-tag active" onclick="filterByCategory('all')">全部</span>
                <span class="filter-tag" onclick="filterByCategory('防护用品')">防护用品</span>
                <span class="filter-tag" onclick="filterByCategory('检测设备')">检测设备</span>
                <span class="filter-tag" onclick="filterByCategory('影像设备')">影像设备</span>
                <span class="filter-tag" onclick="filterByCategory('手术器械')">手术器械</span>
                <span class="filter-tag" onclick="filterByCategory('耗材')">耗材</span>
            </div>
        </div>

        <!-- Data Table -->
        <div class="data-section">
            <div class="section-header">
                <h2>医疗器械列表</h2>
                <span class="update-time" id="updateTime">更新时间: --</span>
            </div>
            <div id="tableContainer">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>加载数据中...</p>
                </div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        // 全局状态
        let currentPage = 1;
        let currentCategory = 'all';
        let searchQuery = '';

        // API基础URL
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:8888/api'
            : '/api';

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const data = await response.json();

                const statsHtml = `
                    <div class="stat-card">
                        <h3>总收录器械</h3>
                        <div class="number">${data.totalDevices.toLocaleString()}</div>
                        <div class="label">件医疗器械产品</div>
                    </div>
                    <div class="stat-card">
                        <h3>数据分类</h3>
                        <div class="number">${Object.keys(data.categories).length}</div>
                        <div class="label">大分类</div>
                    </div>
                    <div class="stat-card">
                        <h3>产品总量</h3>
                        <div class="number">${Object.values(data.categories).reduce((a, b) => a + b, 0)}</div>
                        <div class="label">件产品</div>
                    </div>
                    <div class="stat-card">
                        <h3>数据更新</h3>
                        <div class="number">实时</div>
                        <div class="label">${data.note || '动态抓取更新'}</div>
                    </div>
                `;

                document.getElementById('statsContainer').innerHTML = statsHtml;
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 加载器械数据
        async function loadDevices(page = 1) {
            try {
                currentPage = page;
                const params = new URLSearchParams({
                    page: page,
                    limit: 20,
                    category: currentCategory
                });

                if (searchQuery) {
                    const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(searchQuery)}`);
                    const data = await response.json();
                    renderTable(data.results, { total: data.count, page: 1, totalPages: 1 });
                } else {
                    const response = await fetch(`${API_BASE}/devices?${params}`);
                    const data = await response.json();
                    renderTable(data.data, data.pagination);
                    document.getElementById('updateTime').textContent =
                        '更新时间: ' + new Date(data.updateTime).toLocaleString('zh-CN');
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('tableContainer').innerHTML =
                    '<p style="text-align:center;color:#86868b;padding:2rem;">加载失败，请稍后重试</p>';
            }
        }

        // 渲染表格
        function renderTable(devices, pagination) {
            if (!devices || devices.length === 0) {
                document.getElementById('tableContainer').innerHTML =
                    '<p style="text-align:center;color:#86868b;padding:2rem;">暂无数据</p>';
                return;
            }

            const tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>产品名称</th>
                            <th>型号规格</th>
                            <th>类别</th>
                            <th>生产厂家</th>
                            <th>注册证号</th>
                            <th>有效期至</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${devices.map(device => `
                            <tr>
                                <td><strong>${device.name}</strong></td>
                                <td>${device.model}</td>
                                <td><span class="category-tag">${device.category}</span></td>
                                <td>${device.manufacturer}</td>
                                <td><code>${device.regNumber}</code></td>
                                <td>${device.expiryDate}</td>
                                <td><span class="status-badge ${device.status === '有效' ? 'status-valid' : 'status-expired'}">${device.status}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('tableContainer').innerHTML = tableHtml;
            renderPagination(pagination);
        }

        // 渲染分页
        function renderPagination(pagination) {
            if (!pagination || pagination.totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const { page, totalPages } = pagination;
            let html = '';

            html += `<button ${page <= 1 ? 'disabled' : ''} onclick="loadDevices(${page - 1})">上一页</button>`;

            const startPage = Math.max(1, page - 2);
            const endPage = Math.min(totalPages, page + 2);

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="${i === page ? 'active' : ''}" onclick="loadDevices(${i})">${i}</button>`;
            }

            html += `<button ${page >= totalPages ? 'disabled' : ''} onclick="loadDevices(${page + 1})">下一页</button>`;

            document.getElementById('pagination').innerHTML = html;
        }

        // 搜索
        function searchDevices() {
            const input = document.getElementById('searchInput');
            searchQuery = input.value.trim();
            loadDevices(1);
        }

        // 手动刷新
        async function manualRefresh() {
            const btn = document.querySelector('header button');
            const originalText = btn.textContent;
            btn.textContent = '刷新中...';
            btn.disabled = true;

            document.getElementById('tableContainer').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在刷新数据...</p>
                </div>
            `;

            await loadStats();
            await loadDevices(currentPage);

            btn.textContent = originalText;
            btn.disabled = false;

            const updateTime = document.getElementById('updateTime');
            updateTime.innerHTML = '<span style="color: #2e7d32;">✓ 刷新成功! ' + new Date().toLocaleTimeString('zh-CN') + '</span>';
            setTimeout(() => {
                updateTime.textContent = '更新时间: ' + new Date().toLocaleString('zh-CN');
            }, 2000);
        }

        // 分类筛选
        function filterByCategory(category) {
            currentCategory = category;
            searchQuery = '';
            document.getElementById('searchInput').value = '';

            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active');
            });
            event.target.classList.add('active');

            loadDevices(1);
        }

        // 回车搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchDevices();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadDevices();

            // 定时刷新（每5分钟）
            setInterval(() => {
                loadStats();
                loadDevices(currentPage);
            }, 300000);
        });
    </script>
</body>
</html>
