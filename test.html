<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #message {
            margin-top: 20px;
            color: #28a745;
        }
    </style>
</head>
<body>
    <h1>Hello, World!</h1>
    <p>This is a simple test web page.</p>
    <button onclick="showMessage()">Click Me</button>
    <div id="message"></div>

    <script>
        function showMessage() {
            document.getElementById('message').textContent = 'Button clicked at ' + new Date().toLocaleTimeString();
        }
    </script>
</body>
</html>
